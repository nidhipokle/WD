<!DOCTYPE html>
<html>
<head>
    <title>HTML Frames</title>
</head>

<frameset rows="30%,70%">
    
    <!-- Top Frame -->
    <frame src="top.html">

    <!-- Bottom Frame -->
    <frameset cols="50%,50%">
        <frame src="left.html">
        <frame src="right.html">
    </frameset>

</frameset>

</html>
